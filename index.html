<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brick Breaker Ultra</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <h1>Brick Breaker</h1>
        
        <div id="ui-bar" class="hidden">
            <div id="ui-level">Lvl: 1</div>
            <div id="ui-xp-container">
                <div id="ui-xp-fill"></div>
                <div id="ui-xp-text">0 / 10 XP</div>
            </div>
            <div id="ui-currencies">
                <div id="ui-gold" style="color: #ffd700;">Altın: 0</div>
                <div id="ui-diamond" style="color: #51e9f4;">Elmas: 0</div>
            </div>
        </div>
        
        <!-- Başlangıç Ekranı -->
        <div id="start-screen" class="overlay">
            <h2>HOŞ GELDİNİZ</h2>
            <div class="menu-buttons">
                <button id="start-button">OYUNA BAŞLA</button>
                <button id="settings-button" style="background: #3498db;">AYARLAR</button>
                <button id="start-shop-button">MAĞAZA (MARKET)</button>
                <button id="quests-button">GÖREVLER</button>
                <button id="exit-button" style="background: #e74c3c;">ÇIKIŞ YAP</button>
            </div>
        </div>

        <!-- Ayarlar Ekranı -->
        <div id="settings-screen" class="overlay hidden" style="z-index: 100;">
            <h2>AYARLAR</h2>
            <div class="settings-content" style="background: rgba(0,0,0,0.8); padding: 20px; border-radius: 10px; text-align: left; margin-bottom: 20px; border: 4px solid #555;">
                <div class="setting-item" style="margin-bottom: 15px;">
                    <label for="music-volume" style="display: block; margin-bottom: 5px; color: #fff; font-weight: bold;">Arka Plan Müziği Sesi: <span id="music-vol-label">50%</span></label>
                    <input type="range" id="music-volume" min="0" max="100" value="50" style="width: 100%; accent-color: #3498db;">
                </div>
                <div class="setting-item" style="margin-bottom: 15px;">
                    <label style="display: flex; align-items: center; cursor: pointer; color: #fff; font-weight: bold;">
                        <input type="checkbox" id="sfx-toggle" checked style="width: 20px; height: 20px; margin-right: 10px; accent-color: #e74c3c;">
                        Ses Efektleri (Çarpışma Sesleri vb.)
                    </label>
                </div>
                <div class="setting-item" style="margin-bottom: 10px;">
                    <label style="display: flex; align-items: center; cursor: pointer; color: #fff; font-weight: bold;">
                        <input type="checkbox" id="damage-text-toggle" checked style="width: 20px; height: 20px; margin-right: 10px; accent-color: #2ecc71;">
                        Hasar Yazılarını Göster
                    </label>
                </div>
            </div>
            <button id="close-settings-button">GERİ DÖN</button>
        </div>

        <!-- Oyun Bitti Ekranı -->
        <div id="game-over-screen" class="overlay hidden">
            <h2>OYUN BİTTİ</h2>
            <p id="final-score">Puan: 0</p>
            <div class="menu-buttons">
                <button id="restart-button">YENİDEN DENE</button>
                <button id="shop-button">MAĞAZA (MARKET)</button>
                <button id="go-quests-button">GÖREVLER</button>
            </div>
        </div>

        <!-- Görevler Ekranı -->
        <div id="quests-screen" class="overlay hidden">
            <h2>GÖREVLER & BAŞARIMLAR</h2>
            <div id="quests-list" class="shop-items-grid">
                <!-- Görevler buraya gelecek -->
            </div>
            <button id="close-quests-button">GERİ DÖN</button>
        </div>

        <!-- Mağaza Ekranı (Sekmeli Yapı) -->
        <div id="shop-screen" class="overlay hidden">
            <div id="shop-header">
                <div class="shop-currency">
                    <span style="color: #ffd700;">ALTIN: <span id="shop-gold-val">0</span></span>
                    <span style="color: #51e9f4; margin-left: 20px;">ELMAS: <span id="shop-diamond-val">0</span></span>
                </div>
                <div class="shop-tabs">
                    <button id="tab-upgrades" class="active-tab">GELİŞTİRMELER</button>
                    <button id="tab-launchers">FIRLATICILAR</button>
                </div>
            </div>

            <div id="shop-content">
                <div id="shop-items-list">
                    <!-- Dinamik içerik buraya gelecek -->
                </div>
            </div>
            
            <button id="close-shop-button">GERİ DÖN</button>
        </div>

        <!-- Fırlatıcı Mağazası silindi, yukarıdakine dahil edildi -->

        <!-- Duraklatma (Pause) Menüsü -->
        <div id="pause-menu" class="overlay hidden">
            <h2>OYUN DURAKLATILDI</h2>
            <div class="menu-buttons">
                <button id="resume-button">DEVAM ET</button>
                <button id="pause-settings-button" style="background: #3498db;">AYARLAR</button>
                <button id="pause-quests-button">GÖREVLER</button>
                <button id="main-menu-button" style="background: #e74c3c;">ANA MENÜ</button>
            </div>
            <p style="font-size: 0.5rem; margin-top: 15px; color: #ccc;">(Devam etmek için ESC'ye de basabilirsiniz)</p>
        </div>

        <!-- Geliştirme (Upgrade) Seçim Ekranı -->
        <div id="upgrade-screen" class="overlay hidden">
            <h2>BİR GELİŞTİRME SEÇ</h2>
            <div id="upgrade-list">
                <!-- Kartlar buraya dinamik gelecek -->
            </div>
        </div>

        <canvas id="gameCanvas" width="800" height="650"></canvas>
    </div>
    <script type="module" src="src/main.js"></script>
</body>
</html>
